# ============================================================================
# tmux.conf
#
# dotfiles repo 内の実体ファイル。~/.config/tmux/tmux.conf へ mkOutOfStoreSymlink
# で symlink されており、編集即反映 (drs 不要)。リロードは `prefix + r`。
#
# プラグインの run-shell 行は nix store path を必要とするため、Nix 生成の
# ~/.config/tmux/plugins.conf に分離して末尾で source-file で読み込む。
# ============================================================================

# ----- 基本設定 -----

# prefix を C-s に
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# 256 色 + escape time 短縮
set -g default-terminal "xterm-256color"
set -s escape-time 1

# window / pane index は 1 始まり
set -g base-index 1
set -g pane-base-index 1

# copy-mode は vi キーバインド
set -g mode-keys vi

# ウィンドウを閉じた際に番号を詰める
set -g renumber-windows on

# ステータスバー描画間隔
set -g status-interval 1

# ステータスバー位置
set -g status-position top

# imgcat 等の画像表示 (passthrough) 許可
set -g allow-passthrough on

# FocusGained / FocusLost を端末アプリ (Neovim 等) に伝える
set -g focus-events on

# マウス操作を有効化 (ホバー中ペインのスクロール、クリックでのみフォーカス移動)
set -g mouse on

# ----- ペイン操作 -----

# h/j/k/l でペイン移動、H/J/K/L でリサイズ (-r で連打可)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# prefix + m でペインの zoom in/out
bind -T prefix m resize-pane -Z

# \ で縦分割、- で横分割 (cwd 引き継ぎ)
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# ^ で同 cwd の新規ウィンドウ
bind ^ new-window -c '#{pane_current_path}'

# ----- セッション / リロード / popup -----

# c でセッション名を入力して新セッション作成
bind c command-prompt -p "session name:" "new-session -s '%%'"

# r で config リロード
bind r source-file ~/.config/tmux/tmux.conf \; display "LOADING CONFIGURATION FILE"

# C-q で popup をトグル
bind -n C-q run-shell "zsh -c 'source ~/.zshrc; tmuxpopup'"

# ----- copy-mode vi 共通バインド -----

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# ----- OS 別 clipboard 連携 -----

if-shell '[ "$(uname)" = "Darwin" ]' {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
}

if-shell '[ "$(uname)" = "Linux" ]' {
  bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
  bind-key -T prefix ] run "xsel -o | tmux load-buffer - && tmux paste-buffer"
}

# ----- themepack 設定 (プラグイン読み込み前に必要) -----

set -g @themepack 'powerline/double/blue'
set -g @themepack-status-left-area-middle-format "#(basename #{pane_current_path})"
set -g @themepack-status-left-area-right-format "#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD)"
set -g @themepack-status-right-area-middle-format "%Y/%m/%d"

# ----- プラグイン読み込み (Nix 生成) -----

source-file ~/.config/tmux/plugins.conf
