# prefix, terminal, escape-time, base-index, mode-keys, hjkl 移動/リサイズは
# nix/modules/home/tmux.nix で programs.tmux のオプションとして宣言済

# configファイルリロード (HM の XDG 出力先)
bind r source-file ~/.config/tmux/tmux.conf \; display "LOADING CONFIGURATION FILE"

# ウィンドウを閉じた際に番号を詰める
set -g renumber-windows on

# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# prefix + m でペインのzoom in/zoom out
bind -T prefix m resize-pane -Z

# \ でペインを縦分割する
bind \\ split-window -h -c '#{pane_current_path}'
bind ^ new-window -c '#{pane_current_path}'

# - でペインを横分割する
bind - split-window -v -c '#{pane_current_path}'

# c でセッション名を入力して新しいセッションを作成する
bind c command-prompt -p "session name:" "new-session -s '%%'"

# C-q でpopupをtoggleする
bind -n C-q run-shell "zsh -c 'source ~/.zshrc; tmuxpopup'"

# ステータスバーを上部に
set-option -g status-position top

# imgcat 等の画像表示を許可
set -g allow-passthrough on
